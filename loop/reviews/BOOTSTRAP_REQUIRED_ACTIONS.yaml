# This session both ran the required verification commands and repaired the
# objective defects in-tree (uncommitted, on main). No gate was weakened, no
# human gate approved, no commit/push, no ICML template change, no token read.

applied_fixes:
  - id: BF-1
    severity: major
    area: gate-engine-self-reference
    files:
      - scripts/agent_loop/validate_repo.py
    finding: >-
      legal_verdict_scan scanned every tracked text file for verdict-style
      phrasings, but those phrasings are defined in validate_repo.py. The third
      pattern is a plain literal, so the scanner matched its own policy
      definition and run_gates.sh failed with "forbidden legal/result assertion
      in: scripts/agent_loop/validate_repo.py".
    change: >-
      The definition literals live in a sentinel-delimited block
      (FINK-POLICY-DEFINITIONS-START/END) that scannable_text() strips from this
      module's own source, keyed strictly to this file's resolved path. Every
      other file is scanned in full. secret_scan, private_quote_scan, and
      legal_verdict_scan read through scannable_text().
    verified_by: >-
      Reproduced the regexes over the repo: only the literal pattern self-matched
      pre-fix; post-fix nothing outside the exempt master spec / docs/specs and
      the redacted block matches. run_gates.sh -> GATES_OK. New regression tests
      in tests/test_gate_safety.py cover a real prohibited claim, safe
      disclaimers, the scanner's own definition text, marker balance, and that
      the redaction applies only to the scanner's own path.
  - id: BF-2
    severity: major
    area: queue-backlog-consistency
    files:
      - scripts/agent_loop/validate_repo.py
      - tests/test_gate_safety.py
    finding: >-
      Nothing enforced that queue files resolve to real backlog task ids. A
      phantom id (the original queue.models.txt MR-001..MR-014 corruption)
      silently makes a lane unreachable because select_next drops unknown ids.
    change: >-
      Added the queue_consistency gate (wired into run_gates): every non-comment
      queue line must be a backlog id, no id may appear in two queues, and a task
      may not precede its own dependency within a queue. All five queues pass
      (queue.models.txt=10, queue.s0.txt=8, queue.s1.txt=6, queue.s2.txt=4,
      queue.s3.txt=7), matching loop/BACKLOG.yaml exactly.
    verified_by: >-
      Gate PASS on the real repo; tests assert failure on phantom id, cross-queue
      duplicate, and dependency-order violation.
  - id: BF-3
    severity: major
    area: agent-model-pinning
    files:
      - scripts/agent_loop/run_claude.py
      - tests/test_gate_safety.py
    finding: >-
      run_claude.py used the ambiguous "opus" alias instead of the pinned id and,
      unlike run_codex.py, never schema-validated the review it persisted.
    change: >-
      Pinned the Claude model to claude-opus-4-8 (effort max); added emit_review()
      which validates against claude_review.schema.json before writing, mirroring
      run_codex.py. Codex remains gpt-5.5 / xhigh.
    verified_by: >-
      Source assertions in tests; dry-run review schema-validates; a malformed
      review is rejected when jsonschema is present.
  - id: BF-4
    severity: moderate
    area: gate-coverage-untracked-files
    files:
      - scripts/agent_loop/_common.py
      - scripts/agent_loop/validate_repo.py
      - tests/test_gate_safety.py
    finding: >-
      secret_scan / private_quote_scan / legal_verdict_scan iterated tracked
      files only, so a file a task newly created was first scanned on the next
      task's gates, after git_checkpoint's "git add -A" had already committed it.
    change: >-
      Added _common.untracked_files() and extended text_files_for_scan() to the
      union of tracked and untracked-non-ignored files (keeping the .env skip and
      the .gitignore/binary exclusions, so .fink/ and private dirs stay excluded).
      Strengthening only.
    verified_by: >-
      Tests assert untracked files enter the scan set and a secret in an untracked
      file is flagged; run_gates.sh -> GATES_OK with the new files in scope.
  - id: BF-5
    severity: moderate
    area: sequential-queue-runner
    files:
      - scripts/agent_loop/run_all_queues.sh
      - scripts/agent_loop/loop_once.sh
      - scripts/agent_loop/select_next.py
      - scripts/agent_loop/README.md
    finding: >-
      There was no sequential multi-queue runner, and running one would deadlock
      on the single writer lock that loop_once.sh re-acquires per task.
    change: >-
      Added run_all_queues.sh (order s0 -> models -> s1 -> s2 -> s3) under one
      writer lock; refactored loop_once.sh to honor FINK_LOCK_HELD=1 so the
      parent runner does not self-deadlock; added select_next.py --explain to name
      the human gate blocking a queue. Documented exact usage in README.md.
    verified_by: >-
      --dry-run completes all five queues; --max-tasks-per-queue parsed; loop/STOP
      halts cleanly; the writer lock refuses a second loop command; bad args exit
      2; standalone loop_once.sh --dry-run unchanged.
  - id: BF-6
    severity: minor
    area: dev-tooling-and-deps
    files:
      - pyproject.toml
      - uv.lock
    finding: >-
      "uv run pytest" could never pass: pytest was undeclared and the repo root
      was off sys.path under pytest. PyYAML, a hard runtime dependency, was also
      undeclared.
    change: >-
      Declared pyyaml as a runtime dependency; added a dev group (pytest,
      jsonschema); set pythonpath to the repo root. The offline loop is unaffected
      (it uses python3 + unittest/AST fallbacks).
    verified_by: '"uv run pytest" -> 21 passed, 7 subtests passed.'

# Non-blocking. These touch the REAL-run failure/commit control flow and can only
# be execution-tested by driving a real Codex/Claude failure round, which this
# session must not do (the real CLIs are present; a real run implements product
# features and commits). They are fail-stop, never cause a bad commit or a push.
followup_recommendations:
  - id: RA-1
    severity: major
    blocking: false
    title: Graceful scoped rollback on a real-run gate/sub-tool failure.
    files:
      - scripts/agent_loop/loop_once.sh
    finding: >-
      Under set -euo pipefail, a non-zero run_gates.sh (or a non-zero run_codex/
      run_claude) aborts the round before the verdict logic, leaving a dirty tree
      with no FAILED.patch and no allowed-path restore. It never commits on
      failing gates (set -e aborts before the APPROVE->commit branch), and never
      pushes, so this is fail-stop, not data loss; the next run then fails its
      clean-tree gate until the operator cleans up. Not reached by --dry-run.
    required_change: >-
      Capture these exit statuses without aborting; on failure in a REAL run,
      preserve artifacts and roll back within allowed_paths (reuse
      rollback_failed_task.py). Must NOT roll back in --dry-run (FINK-S0-01's
      allowed_paths include scripts/, so a dry-run rollback would delete loop
      files); gate on dry_run != 1.
    verification:
      - a forced-gate-failure real-run fixture asserting main is clean afterward
  - id: RA-2
    severity: major
    blocking: false
    title: Persist BLOCKED / exhausted status so a failed task is not re-selected.
    files:
      - scripts/agent_loop/loop_once.sh
      - scripts/agent_loop/apply_verdict.py
    finding: >-
      On BLOCKED / EXHAUSTED_REQUEST_CHANGES, loop_once.sh rolls back but never
      calls apply_verdict.py, so the task stays READY; a later loop_once
      re-selects it. run_all_queues / loop_run halt on the exit 1, so there is no
      auto-infinite-loop, but a manual re-run repeats a blocked task.
    required_change: >-
      Persist the terminal status. Reconcile the resulting BACKLOG/STATE dirt by
      committing it as a dedicated "agent-loop: block <task>" checkpoint AFTER the
      allowed-path rollback (failed work stays uncommitted, status durable, main
      clean), or record it in a .fink/ store that select_next consults.
    verification:
      - a terminal-failure fixture asserting the task is excluded from re-selection
  - id: RA-4
    severity: minor
    blocking: false
    title: Informational duplicate model-gate file.
    files:
      - loop/MODEL_RESEARCH_HUMAN_GATES.yaml
      - loop/HUMAN_GATES.yaml
    finding: >-
      loop/MODEL_RESEARCH_HUMAN_GATES.yaml duplicates the four MODEL_* gates that
      live in loop/HUMAN_GATES.yaml (the file the loop loads), with a different
      schema; the two can drift.
    required_change: >-
      Consolidate into HUMAN_GATES.yaml or mark the other file explicitly
      informational-only. Not touched this session (human-gate files are
      sensitive; no functional impact today).
  - id: RA-6
    severity: minor
    blocking: false
    title: ruff/mypy/pytest binaries absent; offline fallbacks are the supported path.
    files:
      - scripts/agent_loop/run_gates.sh
    finding: >-
      ruff/mypy/pytest are not installed, so run_gates.sh uses the style/parse/
      unittest fallbacks. The specific lints ruff would flag were fixed (dropped
      the unused git/HUMAN_GATES_PATH imports in validate_repo.py; dropped a
      placeholder-less f-string in update_loop_docs.py). "uv run pytest" now works.
    required_change: >-
      Optionally install the dev tools (a dev group now exists) and run ruff/mypy
      in CI, or document that the offline fallbacks are the supported path.
  - id: RA-7
    severity: nit
    blocking: false
    title: git_checkpoint forbidden-path check runs before staging.
    files:
      - scripts/agent_loop/git_checkpoint.sh
    finding: >-
      The forbidden-path grep runs before git add -A, so it inspects only
      already-tracked files. Not exploitable today (every forbidden path is
      git-ignored), but stronger if run after staging against
      git diff --cached --name-only.
    required_change: >-
      Move the check after staging, or assert against the staged set.

