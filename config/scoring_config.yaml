    value: 1.00
    heuristic: true
    sensitivity_analysis: vary_or_ablate
    note: Highest authority-supported grounding tier in the configured chain.
  A1:
    value: 0.90
    heuristic: true
    sensitivity_analysis: vary_or_ablate
    note: Official standard-contract grounding; below A0 by design heuristic.
  A2:
    value: 0.80
    heuristic: true
    sensitivity_analysis: vary_or_ablate
    note: Official guidance/casebook grounding; below A1 by design heuristic.
