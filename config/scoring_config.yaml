schema_version: "1.0"
config_id: scoring_config
scoring_config_version: "0.1.0"
status: design_heuristic
source:
  primary_spec: docs/specs/03_SCORING_AND_FINANCIAL_IMPACT.md
  acceptance_refs:
    - AC-INV-9
    - AC-SC-CONFIG
  backlog_task: FINK-S0-07
scoring_frame: Contractual Financial Review Priority
heuristic_policy:
  validation_status: not_scientifically_validated
  sensitivity_analysis_required: true
  applies_to:
    - severity_weight
    - severity_raw_defaults
    - authority_factor
    - conf_floor
    - k_F
    - w_F
    - confidence_weights
    - unverified_factor
    - fim_defaults
    - band_thresholds
    - pathway_thresholds
  paper_language: DFL-inspired
  invariant: INV-9
  note: >-
    All numeric weights, factors, thresholds, bands, coefficients, and defaults
    in this file are design heuristics for sensitivity analysis, not established
    empirical constants.

authority_factor:
