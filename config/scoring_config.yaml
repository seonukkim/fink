pathway_thresholds:
  first_match_wins: true
  high_review_priority_min:
    value: 70
    unit: score_points
    heuristic: true
    sensitivity_analysis: vary_or_ablate
  mid_review_priority_min:
    value: 35
    unit: score_points
    heuristic: true
    sensitivity_analysis: vary_or_ablate
  large_payment_delay_days_min:
    value: 30
    unit: days
    heuristic: true
    sensitivity_analysis: vary_or_ablate
  material_monetary_exposure_present:
    value: true
    heuristic: true
    note: Any non-null exposure range can trigger the pathway rule.
  labels:
    - clarification_likely_sufficient
    - negotiation_required
    - professional_review_required
    - dispute_pathway_may_be_required
  rules:
    - label: professional_review_required
      heuristic: true
      first_match_conditions:
        - uncapped_or_ambiguous_liability_signal_present
        - broad_ip_or_secondary_rights_transfer_signal_present
        - review_priority_score_gte_high_review_priority_min
    - label: negotiation_required
      heuristic: true
      first_match_conditions:
        - material_monetary_exposure_range_present
        - review_priority_score_gte_mid_review_priority_min
    - label: dispute_pathway_may_be_required
      heuristic: true
      first_match_conditions:
        - observed_unpaid_amount_present
        - payment_delay_days_gte_large_payment_delay_days_min
    - label: clarification_likely_sufficient
      heuristic: true
      first_match_conditions:
        - otherwise

attention_band_thresholds:
  low_review_priority:
    min_inclusive:
      value: 0
      unit: score_points
      heuristic: true
    max_exclusive:
      value: 35
