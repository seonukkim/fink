binding_policy:
  canonical_feature_rule: >-
    The 29 canonical feature IDs are copied from upstream record 12 and are the
    only contract-derived financial features available to the FIM modules.
  auxiliary_feature_rule: >-
    The 3 auxiliary fields may support analysis or scenario calculations, but
    they are not canonical scoring variables and must keep score_input=false.
  scenario_input_rule: >-
    User-supplied or derived scenario parameters are anchored to a canonical or
    auxiliary feature_id from record 12. They are not asserted as extracted
    contract values unless value_source=extracted_contract.
