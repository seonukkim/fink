        binding_role: timeline_context
        value_source: extracted_contract_or_user_assumption
      - input_id: ALTERNATIVE_MONTHLY_REVENUE
        feature_id: exclusivity_duration_months
        binding_role: scenario_parameter_anchor
        value_source: user_synthetic_assumption
      - input_id: SCENARIO_PROBABILITY
        feature_id: exclusivity_duration_months
        binding_role: scenario_parameter_anchor
        value_source: user_synthetic_assumption
      - input_id: ANNUAL_DISCOUNT_RATE
        feature_id: exclusivity_duration_months
        binding_role: scenario_parameter_anchor
        value_source: user_or_config_synthetic_assumption
  FIM-6:
    module_name: IP and secondary-rights scenario value
    category_refs: [F5_IP_MONETIZATION]
    inputs:
      - input_id: SECONDARY_RIGHTS
        feature_id: secondary_rights_share
        binding_role: rights_list_anchor
        value_source: extracted_contract_or_user_scenario
      - input_id: SECONDARY_RIGHTS_SHARE
        feature_id: secondary_rights_share
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: TRANSLATION_RIGHTS_SHARE
        feature_id: translation_rights_share
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: RIGHT_SCENARIO_VALUE
        feature_id: secondary_rights_share
        binding_role: scenario_parameter_anchor
        value_source: user_synthetic_assumption
      - input_id: RIGHT_SCENARIO_PROBABILITY
        feature_id: secondary_rights_share
        binding_role: scenario_parameter_anchor
        value_source: user_synthetic_assumption
      - input_id: ANNUAL_DISCOUNT_RATE
        feature_id: secondary_rights_share
        binding_role: scenario_parameter_anchor
        value_source: user_or_config_synthetic_assumption
  FIM-7:
    module_name: Penalty and liability exposure
    category_refs: [F7_TERMINATION_LIABILITY_AND_PENALTIES]
    inputs:
      - input_id: EXPLICIT_PENALTY_CAP
        feature_id: liability_cap
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: PENALTY_BASIS
        feature_id: penalty_amount
        binding_role: direct_extracted_or_text_context
        value_source: extracted_contract
      - input_id: PENALTY_AMOUNT
        feature_id: penalty_amount
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: LIABILITY_CAP
        feature_id: liability_cap
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: TERMINATION_NOTICE_DAYS
        feature_id: termination_notice_days
        binding_role: direct_extracted
        value_source: extracted_contract
      - input_id: IS_UNCAPPED
        feature_id: liability_cap
        binding_role: boolean_signal
        value_source: extracted_contract
      - input_id: IS_AMBIGUOUS
        feature_id: liability_cap
        binding_role: boolean_signal
        value_source: extracted_contract
      - input_id: PENALTY_PROBABILITY
        feature_id: penalty_amount
        binding_role: scenario_parameter_anchor
        value_source: user_synthetic_assumption
      - input_id: SCENARIO_AMOUNT
        feature_id: penalty_amount
        binding_role: scenario_parameter_anchor
        value_source: user_synthetic_assumption
  FIM-8:
    module_name: Evidence-opacity uncertainty
    category_refs: [F1_SETTLEMENT_AND_AUDIT, F9_E_CONTRACT_PRIVACY_AND_EVIDENCE]
    inputs:
