fim_input_bindings:
  FIM-1:
    module_name: Revenue-base and deduction leakage
    category_refs: [F1_SETTLEMENT_AND_AUDIT, F2_REVENUE_AND_DEDUCTIONS]
    inputs:
      - input_id: GROSS_SALES
        feature_id: gross_sales
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: REFUNDS
        feature_id: refunds
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: EXPLICITLY_ALLOWED_DEDUCTIONS
        feature_id: deduction_items
        binding_role: aggregate_list
        value_source: extracted_contract_or_user_assumption
        component_feature_ids:
          - deduction_rate
          - platform_fee
          - payment_processing_fee
          - marketing_cost
      - input_id: REVENUE_SHARE_RATE
        feature_id: revenue_share_rate
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: FIXED_FEE
        feature_id: fixed_fee
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: ADVANCE_RECOUPMENT
        feature_id: advance_recoupment
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: OPEN_ENDED_DEDUCTIONS
        feature_id: deduction_items
        binding_role: open_ended_variant
        value_source: user_synthetic_assumption
  FIM-2:
    module_name: Payment-delay present-value loss
    category_refs: [F3_PAYMENT_AND_CASHFLOW]
    inputs:
      - input_id: DELAYED_AMOUNT
        feature_id: fixed_fee
        binding_role: derived_amount_due
        value_source: extracted_contract_or_user_assumption
        component_feature_ids:
          - fixed_fee
          - minimum_guarantee
          - advance_amount
          - net_sales
          - revenue_share_rate
      - input_id: ANNUAL_DISCOUNT_RATE
        feature_id: payment_delay_days
        binding_role: scenario_parameter_anchor
        value_source: user_or_config_synthetic_assumption
      - input_id: DELAY_DAYS
        feature_id: payment_delay_days
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: PAYMENT_DUE_DAYS
        feature_id: payment_due_days
        binding_role: direct_extracted
        value_source: extracted_contract
      - input_id: TAX_WITHHOLDING
        feature_id: tax_withholding
        binding_role: auxiliary_context
        value_source: extracted_contract_or_user_assumption
      - input_id: SETOFF_SCOPE
        feature_id: setoff_scope
        binding_role: auxiliary_context
        value_source: extracted_contract_or_user_assumption
  FIM-3:
    module_name: MG and advance recoupment
    category_refs: [F4_MG_AND_RECOUPMENT]
    inputs:
      - input_id: MINIMUM_GUARANTEE
        feature_id: minimum_guarantee
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: ADVANCE
        feature_id: advance_amount
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: CUMULATIVE_RECOUPED
        feature_id: advance_recoupment
        binding_role: derived_recoupment_state
        value_source: user_synthetic_assumption
      - input_id: REVENUE_SHARE_RATE
        feature_id: revenue_share_rate
        binding_role: direct_extracted
        value_source: extracted_contract_or_user_assumption
      - input_id: RECOUPMENT_RATE
        feature_id: revenue_share_rate
        binding_role: contextual_alias
        value_source: extracted_contract_or_user_assumption
      - input_id: MONTHLY_NET_SALES
        feature_id: net_sales
        binding_role: scenario_projection
        value_source: user_synthetic_assumption
      - input_id: CONTRACT_DURATION_MONTHS
        feature_id: contract_duration_months
        binding_role: timeline_context
        value_source: extracted_contract_or_user_assumption
  FIM-4:
    module_name: Unpaid additional-work cost
    category_refs: [F8_SCOPE_CREEP_AND_PRODUCTION_COST]
    inputs:
      - input_id: UNPAID_REVISION_UNITS
        feature_id: unpaid_revision_units
        binding_role: direct_extracted_or_user_editable
        value_source: extracted_contract_or_user_assumption
      - input_id: ADDITIONAL_WORK_UNITS
        feature_id: additional_work_units
        binding_role: direct_extracted_or_user_editable
        value_source: extracted_contract_or_user_assumption
      - input_id: HOURS_PER_UNIT
        feature_id: total_work_hours
        binding_role: auxiliary_scenario_parameter
        value_source: user_synthetic_assumption
      - input_id: CREATOR_HOURLY_VALUE
        feature_id: total_work_hours
        binding_role: auxiliary_scenario_parameter
        value_source: user_synthetic_assumption
  FIM-5:
