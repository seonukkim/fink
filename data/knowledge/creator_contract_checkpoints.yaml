schema_version: 1
topics:
  - id: ckpt-f1
    category: F1
    topic_ko: 정산·감사
    topic_en: Settlement and audit
    summary_ko: >-
      정산과 감사 조항은 창작자가 이미 발생한 매출을 실제 현금으로 회수할 수 있는지에
      직접 연결된다. 정산서의 항목, 원자료 확인권, 오류 보정 방식이 흐리면
      미지급이나 누락을 빨리 발견하기 어렵고 다음 제작비 계획도 흔들릴 수 있다.
    checkpoints_ko:
      - 정산서가 언제, 어떤 형식으로, 어떤 매출·공제 항목을 나누어 제공되는지 확인할 것.
      - 플랫폼, 광고주, 유통사 등 제3자 자료와 정산서 숫자를 대조할 방법이 있는지 확인할 것.
      - 매출 원자료 열람 범위, 보관 기간, 열람 요청 절차, 사본 제공 가능성을 확인할 것.
      - 감사 비용 부담, 감사 가능 횟수, 누락 발견 시 비용 전환 기준을 확인할 것.
      - 정산 오류가 발견됐을 때 추가 지급 기한과 지연분 처리 방식이 있는지 확인할 것.
    negotiation_questions_ko:
      - 정산서 원자료를 어떤 범위까지 확인할 수 있고 요청 후 며칠 안에 받을 수 있나요?
      - 정산 누락이 확인되면 부족분과 감사 비용은 어떤 기준으로 처리되나요?
      - 제3자 매출 자료와 정산서가 맞지 않을 때 조정 절차를 문서로 남길 수 있나요?
    provenance:
      source_types:
        - 한국 계약법 일반 원칙
        - 공개 판례 요지
        - 창작 업계 표준계약 가이드
        - 실무 노트
      note: 원문 복제 없이 일반 원칙을 distill

  - id: ckpt-f2
    category: F2
    topic_ko: 매출기준·공제
    topic_en: Revenue base and deductions
    summary_ko: >-
      매출 기준과 공제 항목은 같은 비율을 약정해도 창작자 몫의 기준 금액을 크게
      바꿀 수 있다. 총매출, 순매출, 실제 수령액의 뜻이 섞이면 수익 배분률보다
      공제 순서와 공제 한도가 현금흐름을 더 크게 좌우할 수 있다.
    checkpoints_ko:
      - 수익 배분률을 적용하는 기준이 총매출, 순매출, 실제 수령액 중 무엇인지 확인할 것.
      - 수수료, 결제비용, 환불, 세금, 마케팅비, 제작비가 각각 공제되는지 확인할 것.
      - 공제 가능한 비용의 상한, 사전 승인 요건, 증빙 제출 방식이 있는지 확인할 것.
      - 여러 채널 매출을 합산하는지 채널별로 따로 정산하는지 확인할 것.
      - 할인, 번들, 무료 프로모션이 매출 기준과 창작자 몫에 어떻게 반영되는지 확인할 것.
    negotiation_questions_ko:
      - 수익 배분률은 어떤 금액에 적용되고, 그 전에 빠지는 비용은 무엇인가요?
      - 제작자 승인 없이 공제될 수 있는 비용에 금액 한도나 항목 제한을 둘 수 있나요?
      - 프로모션이나 환불이 있을 때 창작자 정산액 계산 예시를 받을 수 있나요?
    provenance:
      source_types:
        - 한국 계약법 일반 원칙
        - 공개 판례 요지
        - 창작 업계 표준계약 가이드
        - 실무 노트
      note: 원문 복제 없이 일반 원칙을 distill

  - id: ckpt-f3
    category: F3
    topic_ko: 지급시점
    topic_en: Payment timing
    summary_ko: >-
      지급시점은 창작자가 생활비, 외주비, 다음 회차 제작비를 언제 마련할 수 있는지를
      결정한다. 지급일, 검수일, 세금계산서 발행일, 제3자 수령일이 뒤섞이면
      이미 확정된 대가도 예상보다 늦게 들어올 수 있다.
    checkpoints_ko:
      - 계약금, 중도금, 잔금, 정기 정산금의 지급 기준일과 실제 지급 기한을 확인할 것.
      - 검수, 승인, 세금계산서, 플랫폼 입금 등 지급 전제 조건이 무엇인지 확인할 것.
      - 휴일, 월말, 내부 마감일 때문에 지급이 다음 주기나 다음 달로 밀리는지 확인할 것.
      - 지급 지연 시 통지 의무, 지연 기간 산정, 지연분 처리 방식이 있는지 확인할 것.
      - 해외 송금, 원천징수, 환율 적용일이 정산액과 입금일에 미치는 영향을 확인할 것.
    negotiation_questions_ko:
      - 지급일은 검수 완료일 기준인가요, 세금계산서 발행일 기준인가요?
      - 지급이 늦어질 때 창작자가 받을 수 있는 통지와 보정 절차는 무엇인가요?
      - 각 지급 단계별 예상 입금일을 계약서 부속표로 둘 수 있나요?
    provenance:
      source_types:
        - 한국 계약법 일반 원칙
        - 공개 판례 요지
        - 창작 업계 표준계약 가이드
        - 실무 노트
      note: 원문 복제 없이 일반 원칙을 distill

  - id: ckpt-f4
    category: F4
    topic_ko: 선급금 회수
    topic_en: Advance recoupment
    summary_ko: >-
      선급금은 초기 제작비 공백을 줄여 주지만 회수 구조가 불명확하면 이후 수익이
      장기간 입금되지 않을 수 있다. 어떤 매출에서 어느 비율로 회수되는지,
      미회수 잔액이 계약 종료 후에도 남는지에 따라 실제 현금흐름이 달라진다.
    checkpoints_ko:
      - 선급금이 반환 의무 없는 최소보장인지, 장래 수익에서 회수되는 금액인지 확인할 것.
      - 회수 대상 매출, 회수 비율, 회수 순서, 회수 완료 전 정산금 지급 여부를 확인할 것.
      - 여러 작품이나 여러 권리의 수익을 묶어 회수하는 교차 회수 구조가 있는지 확인할 것.
      - 계약 종료, 연재 중단, 성과 미달 시 미회수 잔액 처리 방식을 확인할 것.
      - 세금, 수수료, 외주비와 선급금 회수의 우선순위가 어떻게 정해지는지 확인할 것.
    negotiation_questions_ko:
      - 선급금은 어느 매출에서 어떤 순서로 회수되고, 회수표를 정기적으로 받을 수 있나요?
      - 한 작품의 미회수 잔액을 다른 작품이나 다른 권리 매출에서 회수하나요?
      - 계약이 끝났는데 회수되지 않은 금액은 추가 청구 없이 종료되도록 정할 수 있나요?
    provenance:
      source_types:
        - 한국 계약법 일반 원칙
        - 공개 판례 요지
        - 창작 업계 표준계약 가이드
        - 실무 노트
      note: 원문 복제 없이 일반 원칙을 distill

  - id: ckpt-f5
    category: F5
    topic_ko: 2차 권리
    topic_en: Secondary rights
    summary_ko: >-
      2차 권리는 원작 외 영상화, 출판, 굿즈, 번역, 게임화 같은 추가 수익의 통로가
      될 수 있다. 권리 범위와 수익 배분이 넓고 오래 묶이면 현재 계약의 대가보다
      미래 현금흐름과 협상력이 더 크게 제한될 수 있다.
    checkpoints_ko:
      - 양도, 이용허락, 우선협상권, 대리권 중 어떤 방식으로 2차 권리가 부여되는지 확인할 것.
      - 영상화, 출판, 굿즈, 해외 번역, 게임화 등 권리별 범위와 지역·기간을 확인할 것.
      - 2차 권리 매출의 배분률, 공제 항목, 정산 주기, 증빙 제공 방식을 확인할 것.
      - 권리를 행사하지 않는 기간이 길어질 때 반환 또는 재협상할 수 있는지 확인할 것.
      - 원작자명 표시, 승인권, 원작 훼손 우려가 수익화 조건과 함께 정리되어 있는지 확인할 것.
    negotiation_questions_ko:
      - 2차 권리별로 수익 배분률과 공제 항목을 따로 표로 정리할 수 있나요?
      - 일정 기간 사업화가 진행되지 않으면 해당 권리를 창작자에게 되돌릴 수 있나요?
      - 해외나 영상화 제안이 들어올 때 창작자는 어떤 승인권과 자료 접근권을 갖나요?
    provenance:
      source_types:
        - 한국 계약법 일반 원칙
        - 공개 판례 요지
        - 창작 업계 표준계약 가이드
        - 실무 노트
      note: 원문 복제 없이 일반 원칙을 distill

  - id: ckpt-f6
    category: F6
    topic_ko: 독점·갱신
    topic_en: Exclusivity and renewal
    summary_ko: >-
      독점과 갱신 조항은 창작자가 다른 플랫폼, 브랜드, 출판사와 일할 기회를 얼마나
      보류해야 하는지 정한다. 기간, 자동갱신, 우선권이 넓게 설계되면 당장 받는
      대가보다 놓치는 기회비용이 커질 수 있다.
    checkpoints_ko:
      - 독점 대상이 작품, 세계관, 캐릭터, 창작자 활동 전체 중 어디까지인지 확인할 것.
      - 독점 기간, 갱신 기간, 자동갱신 요건, 갱신 거절 통지 기한을 확인할 것.
      - 비슷한 장르나 다른 명의의 활동까지 제한하는 문구가 있는지 확인할 것.
      - 우선협상권이나 우선매수권이 실제 제안 검토를 얼마나 지연시키는지 확인할 것.
      - 독점 대가가 별도로 책정되어 있고 제한 범위와 균형을 이루는지 확인할 것.
    negotiation_questions_ko:
      - 독점 범위를 작품 단위로 좁히고 창작자 개인 활동은 제외할 수 있나요?
      - 자동갱신 대신 명시적 서면 합의가 있을 때만 연장되도록 바꿀 수 있나요?
      - 우선협상 기간이 지나면 창작자가 다른 제안을 자유롭게 선택할 수 있나요?
    provenance:
      source_types:
        - 한국 계약법 일반 원칙
        - 공개 판례 요지
        - 창작 업계 표준계약 가이드
        - 실무 노트
      note: 원문 복제 없이 일반 원칙을 distill

  - id: ckpt-f7
    category: F7
    topic_ko: 위약금·책임
    topic_en: Penalties and liability
    summary_ko: >-
      위약금과 책임 조항은 문제가 생겼을 때 창작자가 감당해야 할 현금 유출의
      상한을 정한다. 손해 범위, 면책 사유, 책임 한도가 없으면 작은 일정 지연이나
      수정 다툼도 큰 청구 위험으로 번질 수 있다.
    checkpoints_ko:
      - 위약금, 손해배상, 비용 상환이 각각 어떤 사유에서 발생하는지 구분해 확인할 것.
      - 창작자 책임의 금액 한도, 제외되는 간접손해, 이미 받은 대가와의 관계를 확인할 것.
      - 상대방 귀책, 플랫폼 장애, 불가항력, 자료 제공 지연이 면책 또는 기한 연장 사유인지 확인할 것.
      - 해지 사유, 시정 기간, 해지 후 미지급 대가와 자료 반환 처리 방식을 확인할 것.
      - 제3자 권리 주장이나 콘텐츠 수정 요청이 비용 부담으로 이어지는지 확인할 것.
    negotiation_questions_ko:
      - 창작자 책임 총액을 이미 받은 대가나 일정 금액으로 제한할 수 있나요?
      - 상대방 자료 제공이 늦어져 생긴 지연은 위약 사유에서 제외되나요?
      - 문제가 생기면 바로 해지하기 전에 서면 통지와 시정 기간을 둘 수 있나요?
    provenance:
      source_types:
        - 한국 계약법 일반 원칙
        - 공개 판례 요지
        - 창작 업계 표준계약 가이드
        - 실무 노트
      note: 원문 복제 없이 일반 원칙을 distill

  - id: ckpt-f8
    category: F8
    topic_ko: 추가작업
    topic_en: Additional work
    summary_ko: >-
      추가작업 조항은 원래 대가에 포함되는 업무와 별도 비용을 받아야 하는 업무를
      가르는 기준이다. 수정, 홍보, 회의, 포맷 변환, 납품물 추가가 무제한이면
      창작자의 시간과 외주비가 늘어나도 현금 보상이 따라오지 않을 수 있다.
    checkpoints_ko:
      - 납품물 종류, 분량, 해상도, 파일 형식, 회차 수, 마감 횟수를 구체적으로 확인할 것.
      - 기본 대가에 포함되는 수정 횟수와 범위, 추가 수정 단가를 확인할 것.
      - 홍보 출연, 인터뷰, 회의, 플랫폼용 재가공 같은 부가 업무가 포함되는지 확인할 것.
      - 상대방 요청으로 일정이나 사양이 바뀔 때 추가 비용과 마감 연장 기준을 확인할 것.
      - 외주자 비용, 장비비, 촬영비, 소스 구매비를 누가 부담하는지 확인할 것.
    negotiation_questions_ko:
      - 기본 대가에 포함되는 수정은 몇 회이고, 그 이후 단가는 어떻게 계산하나요?
      - 홍보나 회의 참석 같은 부가 업무는 별도 일정과 비용으로 잡을 수 있나요?
      - 상대방 요청으로 사양이 바뀌면 추가 견적 승인 후 진행하도록 정할 수 있나요?
    provenance:
      source_types:
        - 한국 계약법 일반 원칙
        - 공개 판례 요지
        - 창작 업계 표준계약 가이드
        - 실무 노트
      note: 원문 복제 없이 일반 원칙을 distill

  - id: ckpt-f9
    category: F9
    topic_ko: 전자계약·개인정보
    topic_en: E-contract and privacy
    summary_ko: >-
      전자계약과 개인정보 조항은 계약 성립 기록, 수정 이력, 정산 증빙, 계정 접근을
      나중에 확인할 수 있게 만든다. 서명 파일, 알림 기록, 개인정보 이용 목적이
      흩어져 있으면 입금 지연이나 자료 삭제 문제를 설명하기 어려워질 수 있다.
    checkpoints_ko:
      - 전자서명 원본, 서명 일시, 서명자 정보, 계약 변경 이력을 보관할 수 있는지 확인할 것.
      - 정산서, 검수 승인, 수정 요청, 해지 통지 등 중요한 알림의 공식 채널을 확인할 것.
      - 개인정보 수집 목적, 보관 기간, 제3자 제공 범위, 삭제 요청 절차를 확인할 것.
      - 계정 공유, 플랫폼 관리자 권한, 원본 파일 접근권이 누구에게 있는지 확인할 것.
      - 계약 종료 후 자료 삭제, 백업 보관, 정산 증빙 보존 기간이 충돌하지 않는지 확인할 것.
    negotiation_questions_ko:
      - 전자계약 원본과 변경 이력을 창작자도 내려받아 보관할 수 있나요?
      - 정산과 해지 관련 통지는 어떤 채널로 해야 효력이 인정되도록 운영하나요?
      - 계약 종료 후 개인정보와 원본 파일은 언제 삭제되고, 정산 증빙은 얼마나 보관되나요?
    provenance:
      source_types:
        - 한국 계약법 일반 원칙
        - 공개 판례 요지
        - 창작 업계 표준계약 가이드
        - 실무 노트
      note: 원문 복제 없이 일반 원칙을 distill
