<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FInk icon">
  <defs>
    <style>
      .ink-pink { fill: #E83E8C; }
      .ink-deep { fill: #B91C5C; }
      .ink-soft { fill: #FFF1F7; }
      .ink-dark { fill: #1F2937; }
      .stroke-dark {
        fill: none;
        stroke: #1F2937;
        stroke-width: 34;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .stroke-soft {
        fill: none;
        stroke: #FFF1F7;
        stroke-width: 25;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .stroke-deep {
        fill: none;
        stroke: #B91C5C;
        stroke-width: 12;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <!-- Single comic-panel corner -->
  <path class="stroke-dark" d="M126 322V142c0-13 11-24 24-24h190"/>
  <path fill="none" stroke="#FFF1F7" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"
        d="M154 294V158c0-7 6-12 12-12h148"/>

  <!-- Fountain-pen nib silhouette -->
  <path class="ink-dark"
