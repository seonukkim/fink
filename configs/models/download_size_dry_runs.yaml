  no_weight_download: true
  no_snapshot_download: true
  capture_method: >
    Metadata-only download-size dry run. Exact revisions are copied from the
    accepted FINK-MR-02 Hugging Face candidate metadata, and disk-size estimates
    are recorded from that public metadata without snapshot_download, model
    loading, or repository file downloads.
  estimated_disk_size_definition: >
    Per-candidate public repository storage estimate in decimal bytes. This
    excludes local cache duplication, filesystem block overhead, later
    quantization/export variants, and any future private benchmark artifacts.
  approved_network_gate: MODEL_METADATA_NETWORK_APPROVED
  refresh_command: >
    scripts/model_research/run_with_hf_auth.sh python3
    scripts/model_research/model_size_dry_run_records.py --validate
  model_storage_boundary: >
    Future weights may be downloaded only under $PRIVATE_ROOT/models or the
    Hugging Face cache. Public Git records metadata and dry-run size estimates
    only.
  tracked_weight_files_at_capture: []
  weight_file_suffixes:
    - .safetensors
    - .gguf
    - .onnx
    - .pt
    - .pth
    - .h5
    - .bin
    - .ckpt

