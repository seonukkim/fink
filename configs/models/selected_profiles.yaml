  download_size_dry_runs: configs/models/download_size_dry_runs.yaml
  open_license_shortlist: configs/models/open_license_shortlist.yaml
  model_card: docs/model-card.md

public_git_boundary:
  allowed_content:
    - model_ids
    - licenses
    - exact_revisions
    - public_safe_configs
    - benchmark_summaries
    - selected_profiles
  excluded_content:
    - model_weights
    - private_model_paths
    - Hugging_Face_token_values
    - real_contract_text
    - private_corpus_passages
    - PDFs_or_ZIPs
    - .fink_artifacts
  downloaded_weight_files: false
  tracked_weight_files_at_capture: []

license_policy:
  default_floor: public_open
  max_download_size_gb: 20
  accepted_licenses:
    - apache-2.0
    - mit
    - bsd-2-clause
    - bsd-3-clause
    - isc
    - cc0-1.0
    - cc-by-4.0
  rejected_by_default:
    - unknown
    - missing
    - gated
    - custom
    - other
    - noncommercial
    - research-only

runtime_config:
  runtime_profile: core_local_offline_v1
  desktop_runtime_profile: desktop_local_full
  remote_runtime_api_allowed: false
  runtime_download_allowed: false
  telemetry_allowed: false
  storage_boundary: "$PRIVATE_ROOT/models or Hugging Face cache outside the Git repository"
  offline_environment_flags:
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
    HF_DATASETS_OFFLINE: "1"
    HF_HUB_DISABLE_TELEMETRY: "1"
    DO_NOT_TRACK: "1"
    FINK_RUNTIME_REMOTE_API_ALLOWED: "false"
    FINK_RUNTIME_OFFLINE: "true"
    FINK_MODEL_DOWNLOAD_ALLOWED: "false"

