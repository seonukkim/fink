schema_version: 1
task_id: FINK-MODEL-01
manifest_id: fink_local_runtime_profiles_v1
captured_at: "2026-06-22T00:00:00+09:00"
source_records:
  candidates: configs/models/candidates.yaml
  selected_profiles: configs/models/selected_profiles.yaml
  open_license_shortlist: configs/models/open_license_shortlist.yaml

runtime_boundary:
  remote_runtime_api_allowed: false
  telemetry_allowed: false
  runtime_download_allowed_on_analyze: false
  no_weights_in_git: true
  no_env_file_read: true
  data_root_default: "${XDG_DATA_HOME:-$HOME/.local/share}/fink"
  model_root_relative: "models"
  deterministic_fallback:
    enabled: true
    implementation: src/fink/model/runtime.py
    adapters:
      - ocr
      - embedding
      - reranker
      - optional_extractor
      - optional_explanation_qa

offline_environment_flags:
  HF_HUB_OFFLINE: "1"
  TRANSFORMERS_OFFLINE: "1"
  HF_DATASETS_OFFLINE: "1"
  HF_HUB_DISABLE_TELEMETRY: "1"
  DO_NOT_TRACK: "1"
  FINK_RUNTIME_REMOTE_API_ALLOWED: "false"
  FINK_RUNTIME_OFFLINE: "true"
  FINK_MODEL_DOWNLOAD_ALLOWED: "false"

download_policy:
  no_real_download_in_tests: true
  requires_explicit_download_flag: true
  public_ungated_models_do_not_require_token: true
  resumable_downloads: true
  max_download_size_gb: 20
  safetensors_preferred: true
  reject_pickle_by_default: true
  approved_pickle_component_ids: []
  safe_file_allow_patterns:
    - "*.json"
    - "*.txt"
    - "*.md"
    - "*.model"
    - "*.safetensors"
    - "tokenizer.*"
    - "vocab.*"
    - "merges.txt"
    - "sentencepiece.bpe.model"
  pickle_reject_patterns:
    - "*.bin"
    - "*.ckpt"
    - "*.h5"
    - "*.joblib"
    - "*.pickle"
    - "*.pkl"
    - "*.pt"
    - "*.pth"

license_policy:
  default_floor: public_open
  accepted_licenses:
    - apache-2.0
    - mit
    - bsd-2-clause
    - bsd-3-clause
    - isc
    - cc0-1.0
    - cc-by-4.0

