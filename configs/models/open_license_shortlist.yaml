shortlist_policy:
  default_floor: public_open
  accepted_licenses:
    - apache-2.0
    - mit
    - bsd-2-clause
    - bsd-3-clause
    - isc
    - cc0-1.0
    - cc-by-4.0
  rejected_by_default:
    - unknown
    - missing
    - gated
    - custom
    - other
    - noncommercial
    - research-only
  required_metadata:
    - license_present
    - license_in_public_open_allowlist
    - gated_false
    - access_status_public_ungated
    - private_false
    - disabled_false
    - exact_revision_pinned
    - estimated_size_recorded
  decision_rule: >
    A model is accepted only when its recorded license is in the public_open
    allowlist, it is public and ungated, it is not disabled or private, it has
    a pinned exact revision, and FINK-MR-03 recorded a metadata-only size dry run.
    Unknown, missing, gated, custom, other, noncommercial, and research-only
    licenses remain rejected by default.

