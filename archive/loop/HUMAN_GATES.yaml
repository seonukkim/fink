schema_version: 1

# Gate approval model (see HD-12 in docs/specs/HUMAN_DECISION_RESOLUTIONS.md):
#   approval: human -> a person must review and set approved:true / status:RESOLVED.
#   approval: auto  -> resolved by an encoded, machine-enforced policy.
# Auto-resolution does NOT bypass the machine gates in run_gates.sh; those still
# enforce the real safety properties (no legal verdict, A0-A2-only scoring, no
# tracked weights/private files, open-license floor, ...) on EVERY task.
gates:
  HR-01:
    status: RESOLVED
    approved: true
    approval: auto
    policy: conservative_mode
    priority: P0
    notes: "Auto-resolved under conservative mode: the system never asserts current law; evidence stays UNVERIFIED and date-stamped; scoring is A0-A2-only. No current-law claim is made, so no legal verification is needed. Enforced each task by legal_verdict_scan + authority_invariant + the INV suite."
  HR-02:
    status: RESOLVED
    approved: true
    approval: auto
    policy: conservative_mode
    priority: P0
    notes: "Auto-resolved under conservative mode: webtoon-specific signals are practice references, not authoritative grounded scores; A0-A2 grounding required to contribute to a score. No authoritative webtoon-law claim is made."
  HR-03:
    status: RESOLVED
    approved: true
    approval: auto
    policy: conservative_mode
    priority: P1
    notes: "Auto-resolved under conservative mode: Korean is canonical; English aliases are never labeled evidence; the 8 non-equivalence terms carry caveats. No cross-lingual legal claim is made."
  HR-04:
    status: RESOLVED
    approved: true
    approval: auto
    policy: conservative_mode
    priority: P2
    notes: "Auto-resolved: artist-welfare material is cross-cutting and never score-eligible, enforced by the authority/eligibility invariants."
  HR-05:
    status: RESOLVED
    approved: true
    approval: auto
    policy: conservative_mode
    priority: P1
    notes: "Auto-resolved under conservative mode: dated (2018-2021) figures are always shown with their source date and never presented as current."
  HR-06:
    status: RESOLVED
    approved: true
    approval: auto
    policy: conservative_mode
    priority: P2
    notes: "Auto-resolved: glossary risk_category is checked by the glossary/eligibility invariants rather than a manual spot-check."
  HR-07:
    status: RESOLVED
    approved: true
    approval: human
    priority: P1
    notes: "Governing offering 2026 Spring IE412 AI for Finance; deadline 2026-06-24 23:59 KST."
  HR-08:
    status: RESOLVED
    approved: true
    approval: human
    priority: P1
    notes: "STAYS HUMAN. Academic-integrity attestation that the author personally reviewed the AI-assisted outputs before release. Auto-attesting would misrepresent the author's review to the course. Flip to approved:true / RESOLVED only at submission, after reviewing. Everything up to release automates; this is the single final human step."
  MODEL_METADATA_NETWORK_APPROVED:
    status: APPROVED
    approved: true
    approval: human
    priority: P1
    notes: "Metadata and dry-run size checks may use Hugging Face with the cached token through run_with_hf_auth.sh."
  MODEL_LICENSES_APPROVED:
    status: RESOLVED
    approved: true
    approval: auto
    policy: open_license_floor
    priority: P1
    notes: "Auto-resolved under the open-source-only license floor (apache-2.0, mit, bsd-2-clause, bsd-3-clause, isc, cc0-1.0, cc-by-4.0; reject gated/unknown/custom/other/noncommercial/research-only). Enforced by model_license_floor + the loop's open_license_policy_check, which verifies real licenses from HF metadata."
  MODEL_DOWNLOAD_APPROVED:
    status: RESOLVED
    approved: true
    approval: auto
    policy: open_license_floor + size_cap
    priority: P1
    notes: "Auto-resolved: download only open-allowlisted models within max_download_size_gb (configs/models/candidates.yaml). Weights remain outside Git, enforced by tracking_scan + model_license_floor."
  MODEL_PROFILE_APPROVED:
    status: RESOLVED
    approved: true
    approval: auto
    policy: open_license_floor
    priority: P1
    notes: "Auto-resolved: the selected local profile must use only open-allowlisted, offline-loadable models recorded with pinned revisions."
